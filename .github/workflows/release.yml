name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: arena-rs.exe
            asset_name: arena-rs-windows.zip

          - os: macos-latest
            artifact_name: arena-rs
            asset_name: arena-rs-macos.zip

          - os: ubuntu-latest
            artifact_name: arena-rs
            asset_name: arena-rs-linux.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Build
        run: cargo build --release

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item target/release/arena-rs.exe dist/
          Copy-Item -Recurse assets dist/assets
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset_name }}

      - name: Package (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir dist
          cp target/release/arena-rs dist/
          cp -r assets dist/assets
          zip -r ${{ matrix.asset_name }} dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
